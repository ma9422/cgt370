const data = rawData.map(d => ({ ...d, capacity_mw: +d.capacity_mw }));

document.getElementById('binSlider').addEventListener('input', function () {
  document.getElementById('binVal').textContent = this.value;
  drawHistogram(data, +this.value);

// 1. HISTOGRAM
function drawHistogram(data, binCount) {
  const margin = { top: 20, right: 20, bottom: 40, left: 50 };
  const width  = W - margin.left - margin.right;
  const height = 280 - margin.top - margin.bottom;

  const svg = d3.select("#histSvg").attr("width", W).attr("height", 280);
  svg.selectAll("*").remove();
  const g = svg.append("g").attr("transform", `translate(${margin.left},${margin.top})`);

  const values = data.map(d => d.capacity_mw);
  const x = d3.scaleLinear().domain(d3.extent(values)).range([0, width]);

  const bins = d3.bin()
    .domain(d3.extent(values))
    .thresholds(binCount)
    (values);

  const y = d3.scaleLinear()
    .domain([0, d3.max(bins, d => d.length)]).nice()
    .range([height, 0]);

  g.selectAll("rect").data(bins).enter().append("rect")
    .attr("x", d => x(d.x0) + 1)
    .attr("y", d => y(d.length))
    .attr("width", d => Math.max(0, x(d.x1) - x(d.x0) - 1))
    .attr("height", d => height - y(d.length))
    .attr("fill", "steelblue");

  g.append("g").attr("class","axis").attr("transform",`translate(0,${height})`).call(d3.axisBottom(x).ticks(6).tickFormat(d => d >= 1000 ? d/1000+"k" : d));
  g.append("g").attr("class","axis").call(d3.axisLeft(y).ticks(5));
  g.append("text").attr("x", width/2).attr("y", height+35).attr("text-anchor","middle").attr("font-size",11).attr("fill","#555").text("Capacity (MW)");
}

// 2. BOX PLOT 
function drawBoxPlot(data) {
  const margin = { top: 20, right: 20, bottom: 65, left: 50 };
  const width  = W - margin.left - margin.right;
  const height = 320 - margin.top - margin.bottom;

  const svg = d3.select("#boxSvg").attr("width", W).attr("height", 320);
  svg.selectAll("*").remove();
  const g = svg.append("g").attr("transform", `translate(${margin.left},${margin.top})`);

  const grouped = d3.group(data, d => d.energy_type);
  const types   = Array.from(grouped.keys()).sort();

  const x = d3.scaleBand().domain(types).range([0, width]).padding(0.2);
  const y = d3.scaleLinear().domain([0, d3.max(data, d => d.capacity_mw)]).range([height, 0]);

  grouped.forEach((values, key) => {
    const capacities = values.map(d => d.capacity_mw).sort(d3.ascending);
    const q1     = d3.quantileSorted(capacities, 0.25);
    const median = d3.quantileSorted(capacities, 0.5);
    const q3     = d3.quantileSorted(capacities, 0.75);
    const min    = d3.min(capacities);
    const max    = d3.max(capacities);
    const center = x(key) + x.bandwidth() / 2;

    g.append("line").attr("x1",center).attr("x2",center).attr("y1",y(min)).attr("y2",y(max)).attr("stroke","black");
    g.append("rect").attr("x",center-10).attr("width",20).attr("y",y(q3)).attr("height",y(q1)-y(q3)).attr("fill","orange");
    g.append("line").attr("x1",center-10).attr("x2",center+10).attr("y1",y(median)).attr("y2",y(median)).attr("stroke","black").attr("stroke-width",2);
  });

  g.append("g").attr("class","axis").attr("transform",`translate(0,${height})`).call(d3.axisBottom(x).tickSize(0)).selectAll("text").attr("transform","rotate(-35)").attr("text-anchor","end").attr("dy","0.2em").attr("dx","-0.4em");
  g.append("g").attr("class","axis").call(d3.axisLeft(y).ticks(5).tickFormat(d => d >= 1000 ? d/1000+"k" : d));
}

// 3. PIE CHART 
function drawPie(data) {
  const radius = 150;
  const width  = W;
  const height = 360;

  d3.select("#pieSvg").selectAll("*").remove();
  const svg = d3.select("#pieSvg").attr("width", width).attr("height", height);
  const g = svg.append("g").attr("transform", `translate(${radius + 20},${height / 2})`);

  const summary = d3.rollups(
    data,
    v => d3.sum(v, d => d.capacity_mw),
    d => d.energy_type
  ).map(([energy_type, total]) => ({ energy_type, total }));

  const pie     = d3.pie().value(d => d.total);
  const filtered = summary.filter(d => d.total >= 10);
  const arcs    = pie(filtered);
  const arc     = d3.arc().innerRadius(0).outerRadius(radius);
  const color   = d3.scaleOrdinal(d3.schemeCategory10);

  g.selectAll("path").data(arcs).enter().append("path")
    .attr("d", arc)
    .attr("fill", d => color(d.data.energy_type))
    .attr("stroke", "white")
    .attr("stroke-width", 1);

  const legendG = svg.append("g").attr("transform", `translate(${radius * 2 + 50}, 20)`);
  filtered.sort((a,b) => b.total - a.total).forEach((d, i) => {
    const row = legendG.append("g").attr("transform", `translate(0,${i * 22})`);
    row.append("rect").attr("width",12).attr("height",12).attr("rx",2).attr("fill", color(d.energy_type));
    row.append("text").attr("x",18).attr("y",10).attr("font-size",12).attr("fill","#333").text(d.energy_type);
  });
}
