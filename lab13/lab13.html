<title>Power Plants Dashboard</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f5f0;
    --card: #ffffff;
    --ink: #1a1a1a;
    --muted: #6b6b6b;
    --border: #e0ddd6;
    --nuclear: #e8527a;
    --gas: #2e2e2e;
    --wind: #f0b429;
    --coal: #40c4c4;
    --solar: #ff8c00;
    --hydro: #4a90d9;
    --fossil-color: #555555;
    --renewable-color: #3db869;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 2rem;
  }

  header {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    margin-bottom: 2rem;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 2rem;
    letter-spacing: -0.02em;
  }

  header p {
    font-size: 0.85rem;
    color: var(--muted);
    font-weight: 300;
  }

  .dashboard {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 1.5rem;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }

  .card.scatter { grid-row: 1 / 3; }

  .card h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 1rem;
    font-weight: 400;
    color: var(--ink);
    margin-bottom: 0.25rem;
  }
  .card .subtitle {
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  svg text { font-family: 'DM Sans', sans-serif; }

  .axis-label {
    font-size: 12px;
    fill: var(--ink);
    font-weight: 500;
  }

  .tick text { font-size: 11px; fill: var(--muted); }
  .tick line, .domain { stroke: var(--border); }

  .legend { display: flex; flex-wrap: wrap; gap: 0.5rem 1rem; margin-top: 0.75rem; }
  .legend-item { display: flex; align-items: center; gap: 0.35rem; font-size: 0.75rem; color: var(--ink); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid; }
  .legend-line { width: 22px; height: 2px; }
  .legend-bar { width: 12px; height: 12px; border-radius: 2px; }

  .tooltip {
    position: fixed;
    background: var(--ink);
    color: #fff;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 12px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 999;
    white-space: nowrap;
  }
</style>
</head>
<body>

  return lines.slice(1).map(line => {
    const vals = line.split(',');
    return {
      energy_type: vals[4],
      capacity_mw: +vals[5],
      year_built: +vals[6]
    };
  });
}

const data = parseCSV(CSV);

const FOSSIL = new Set(['Coal','Gas','Nuclear']);
const RENEWABLE = new Set(['Wind','Solar','Hydro']);

const TYPE_COLOR = {
  Nuclear: 'var(--nuclear)',
  Gas: 'var(--gas)',
  Wind: 'var(--wind)',
  Coal: 'var(--coal)',
  Solar: 'var(--solar)',
  Hydro: 'var(--hydro)'
};

const tooltip = document.getElementById('tooltip');

function showTip(e, html) {
  tooltip.innerHTML = html;
  tooltip.style.opacity = 1;
  tooltip.style.left = (e.clientX + 14) + 'px';
  tooltip.style.top = (e.clientY - 28) + 'px';
}
function hideTip() { tooltip.style.opacity = 0; }

// Decade bins 
const DECADES = [1975, 1985, 1995, 2005, 2015];
function decadeLabel(y) {
  if (y < 1985) return 1985;
  if (y < 1995) return 1990;
  if (y < 2005) return 2000;
  if (y < 2015) return 2005;
  return 2010;
}

const XTICKS = [1985, 1990, 2000, 2005, 2010, 2020];

// SCATTOR PLOT
(function() {
  const W = document.getElementById('scatter').clientWidth || 400;
  const H = 340;
  const margin = {top: 20, right: 20, bottom: 60, left: 60};
  const w = W - margin.left - margin.right;
  const h = H - margin.top - margin.bottom;

  const svg = d3.select('#scatter')
    .append('svg').attr('width', W).attr('height', H)
    .append('g').attr('transform', `translate(${margin.left},${margin.top})`);

  const x = d3.scaleLinear().domain([1975, 2025]).range([0, w]);
  const y = d3.scaleLinear().domain([0, 2400]).range([h, 0]);

  svg.append('g').attr('transform', `translate(0,${h})`).call(
    d3.axisBottom(x).tickValues(XTICKS).tickFormat(d3.format('d'))
  );
  svg.append('g').call(d3.axisLeft(y).ticks(5));

  // AXIS LABELS
  svg.append('text').attr('class','axis-label')
    .attr('x', w/2).attr('y', h+48).attr('text-anchor','middle').text('Year');
  svg.append('text').attr('class','axis-label')
    .attr('transform','rotate(-90)').attr('x', -h/2).attr('y', -44)
    .attr('text-anchor','middle').text('Size');

  // GRID
  svg.append('g').attr('class','grid')
    .call(d3.axisLeft(y).ticks(5).tickSize(-w).tickFormat(''))
    .call(g => g.select('.domain').remove())
    .call(g => g.selectAll('.tick line').attr('stroke','#f0ede8').attr('stroke-dasharray','3,3'));

  
  const showTypes = ['Nuclear','Gas','Wind','Coal'];
  const filtered = data.filter(d => showTypes.includes(d.energy_type));

  svg.selectAll('circle')
    .data(filtered)
    .join('circle')
    .attr('cx', d => x(d.year_built))
    .attr('cy', d => y(d.capacity_mw))
    .attr('r', 7)
    .attr('fill', 'none')
    .attr('stroke', d => TYPE_COLOR[d.energy_type])
    .attr('stroke-width', 2.2)
    .attr('opacity', 0.75)
    .on('mousemove', (e, d) => showTip(e, `${d.energy_type}<br>${d.year_built} · ${d.capacity_mw} MW`))
    .on('mouseleave', hideTip);

  // Legend
  const leg = document.getElementById('scatter-legend');
  showTypes.forEach(t => {
    leg.innerHTML += `<div class="legend-item">
      <div class="legend-dot" style="border-color:${TYPE_COLOR[t]};background:transparent"></div>
      <span>${t}</span>
    </div>`;
  });
})();

// LINE CHART
(function() {
  const W = document.getElementById('linechart').clientWidth || 380;
  const H = 220;
  const margin = {top: 20, right: 20, bottom: 60, left: 60};
  const w = W - margin.left - margin.right;
  const h = H - margin.top - margin.bottom;


  const binMap = {fossil: {}, renewable: {}};
  XTICKS.forEach(t => { binMap.fossil[t] = []; binMap.renewable[t] = []; });

  data.forEach(d => {
    const bin = decadeLabel(d.year_built);
    if (!binMap.fossil[bin] && !binMap.renewable[bin]) return;
    if (FOSSIL.has(d.energy_type) && binMap.fossil[bin]) binMap.fossil[bin].push(d.capacity_mw);
    if (RENEWABLE.has(d.energy_type) && binMap.renewable[bin]) binMap.renewable[bin].push(d.capacity_mw);
  });

  const fossilLine = XTICKS.map(t => ({year: t, val: d3.mean(binMap.fossil[t]) || 0}));
  const renewableLine = XTICKS.map(t => ({year: t, val: d3.mean(binMap.renewable[t]) || 0}));

  const allVals = [...fossilLine, ...renewableLine].map(d => d.val);
  const yMax = d3.max(allVals) * 1.15;

  const svg = d3.select('#linechart')
    .append('svg').attr('width', W).attr('height', H)
    .append('g').attr('transform', `translate(${margin.left},${margin.top})`);

  const x = d3.scaleLinear().domain([1983, 2022]).range([0, w]);
  const y = d3.scaleLinear().domain([0, yMax]).range([h, 0]);

  svg.append('g').attr('transform', `translate(0,${h})`).call(
    d3.axisBottom(x).tickValues(XTICKS).tickFormat(d3.format('d'))
  );
  svg.append('g').call(d3.axisLeft(y).ticks(4));

  svg.append('text').attr('class','axis-label')
    .attr('x', w/2).attr('y', h+48).attr('text-anchor','middle').text('Year');
  svg.append('text').attr('class','axis-label')
    .attr('transform','rotate(-90)').attr('x', -h/2).attr('y', -44)
    .attr('text-anchor','middle').text('Size');

  const lineGen = d3.line().x(d => x(d.year)).y(d => y(d.val)).curve(d3.curveLinear);

// FOSSIL BLACK
  svg.append('path').datum(fossilLine)
    .attr('fill','none').attr('stroke', 'var(--fossil-color)')
    .attr('stroke-width', 2).attr('stroke-dasharray','6,4')
    .attr('d', lineGen);

  svg.selectAll('.fossil-dot').data(fossilLine).join('circle')
    .attr('class','fossil-dot')
    .attr('cx', d => x(d.year)).attr('cy', d => y(d.val))
    .attr('r', 5).attr('fill','none').attr('stroke','var(--fossil-color)').attr('stroke-width',2)
    .on('mousemove', (e, d) => showTip(e, `Fossil · ${d.year}<br>Avg: ${d.val.toFixed(0)} MW`))
    .on('mouseleave', hideTip);

  // RENEWABLE GREEN
  svg.append('path').datum(renewableLine)
    .attr('fill','none').attr('stroke', 'var(--renewable-color)')
    .attr('stroke-width', 2).attr('stroke-dasharray','6,4')
    .attr('d', lineGen);

  svg.selectAll('.renew-dot').data(renewableLine).join('circle')
    .attr('class','renew-dot')
    .attr('cx', d => x(d.year)).attr('cy', d => y(d.val))
    .attr('r', 5).attr('fill','none').attr('stroke','var(--renewable-color)').attr('stroke-width',2)
    .on('mousemove', (e, d) => showTip(e, `Renewable · ${d.year}<br>Avg: ${d.val.toFixed(0)} MW`))
    .on('mouseleave', hideTip);

  const leg = document.getElementById('line-legend');
  leg.innerHTML = `
    <div class="legend-item"><div class="legend-line" style="background:var(--fossil-color);border-top:2px dashed var(--fossil-color);height:0"></div><span>fossil</span></div>
    <div class="legend-item"><div class="legend-line" style="background:var(--renewable-color);border-top:2px dashed var(--renewable-color);height:0"></div><span>renewable</span></div>`;
})();

// BAR CHART
(function() {
  const W = document.getElementById('barchart').clientWidth || 380;
  const H = 220;
  const margin = {top: 20, right: 20, bottom: 60, left: 60};
  const w = W - margin.left - margin.right;
  const h = H - margin.top - margin.bottom;

  const bins = {};
  XTICKS.forEach(t => bins[t] = {fossil: 0, renewable: 0, count_f: 0, count_r: 0});

  data.forEach(d => {
    const bin = decadeLabel(d.year_built);
    if (!bins[bin]) return;
    if (FOSSIL.has(d.energy_type)) { bins[bin].fossil += d.capacity_mw; bins[bin].count_f++; }
    if (RENEWABLE.has(d.energy_type)) { bins[bin].renewable += d.capacity_mw; bins[bin].count_r++; }
  });

  const barData = XTICKS.map(t => ({year: t, fossil: bins[t].fossil, renewable: bins[t].renewable}));
  const yMax = d3.max(barData, d => Math.max(d.fossil, d.renewable)) * 1.15;

  const svg = d3.select('#barchart')
    .append('svg').attr('width', W).attr('height', H)
    .append('g').attr('transform', `translate(${margin.left},${margin.top})`);

  const x0 = d3.scaleBand().domain(XTICKS).range([0, w]).padding(0.25);
  const x1 = d3.scaleBand().domain(['fossil','renewable']).range([0, x0.bandwidth()]).padding(0.08);
  const y = d3.scaleLinear().domain([0, yMax]).range([h, 0]);

  svg.append('g').attr('transform', `translate(0,${h})`).call(
    d3.axisBottom(x0).tickFormat(d3.format('d'))
  );
  svg.append('g').call(d3.axisLeft(y).ticks(4));

  svg.append('text').attr('class','axis-label')
    .attr('x', w/2).attr('y', h+48).attr('text-anchor','middle').text('Year');
  svg.append('text').attr('class','axis-label')
    .attr('transform','rotate(-90)').attr('x', -h/2).attr('y', -44)
    .attr('text-anchor','middle').text('Size');

  const groups = svg.selectAll('.bar-group')
    .data(barData).join('g')
    .attr('class','bar-group')
    .attr('transform', d => `translate(${x0(d.year)},0)`);

  groups.selectAll('.bar-fossil')
    .data(d => [{val: d.fossil, year: d.year}])
    .join('rect').attr('class','bar-fossil')
    .attr('x', x1('fossil')).attr('width', x1.bandwidth())
    .attr('y', d => y(d.val)).attr('height', d => h - y(d.val))
    .attr('fill', 'var(--fossil-color)').attr('opacity', 0.75)
    .on('mousemove', (e, d) => showTip(e, `Fossil · ${d.year}<br>Total: ${d.val.toFixed(0)} MW`))
    .on('mouseleave', hideTip);

  groups.selectAll('.bar-renew')
    .data(d => [{val: d.renewable, year: d.year}])
    .join('rect').attr('class','bar-renew')
    .attr('x', x1('renewable')).attr('width', x1.bandwidth())
    .attr('y', d => y(d.val)).attr('height', d => h - y(d.val))
    .attr('fill', 'var(--renewable-color)').attr('opacity', 0.75)
    .attr('stroke', 'var(--renewable-color)').attr('stroke-width', 1.5)
    .on('mousemove', (e, d) => showTip(e, `Renewable · ${d.year}<br>Total: ${d.val.toFixed(0)} MW`))
    .on('mouseleave', hideTip);

  const leg = document.getElementById('bar-legend');
  leg.innerHTML = `
    <div class="legend-item"><div class="legend-bar" style="background:var(--fossil-color);opacity:0.75"></div><span>fossil</span></div>
    <div class="legend-item"><div class="legend-bar" style="background:var(--renewable-color);opacity:0.75"></div><span>renewable</span></div>`;
})();
</script>
</body>
</html>
