<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tokyo Revengers — Gang Network</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+JP:wght@300;400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #080a0d;
    --bg2:      #0e1116;
    --panel:    #13171f;
    --border:   #1e2530;
    --text:     #cdd0d8;
    --muted:    #525a6a;
    --accent:   #f0c040;
    --panel-w:  320px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.03;
    pointer-events: none;
    z-index: 10;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      -55deg, transparent, transparent 60px,
      rgba(255,255,255,0.012) 60px,
      rgba(255,255,255,0.012) 61px
    );
    pointer-events: none;
    z-index: 11;
  }

  /* ── HEADER ─────────────────────────────────────────────────────────────── */
  header {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex; align-items: center; gap: 18px;
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(to bottom, rgba(8,10,13,0.98), rgba(8,10,13,0.0));
    transition: right 0.4s cubic-bezier(0.4,0,0.2,1);
  }
  header.panel-open { right: var(--panel-w); }

  .title-block { line-height: 1; }
  .title-jp {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 10px; letter-spacing: 0.25em;
    color: var(--muted); text-transform: uppercase; margin-bottom: 2px;
  }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px; letter-spacing: 0.08em; color: #fff; line-height: 1;
  }
  h1 span { color: var(--accent); }

  .badge {
    margin-left: auto;
    font-size: 9px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--muted);
    border: 1px solid var(--border);
    padding: 4px 10px; border-radius: 2px;
  }

  /* ── HINT ───────────────────────────────────────────────────────────────── */
  #hint {
    position: fixed; bottom: 80px; left: 50%;
    transform: translateX(-50%);
    font-size: 9px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--muted);
    pointer-events: none; z-index: 40;
    transition: opacity 0.6s;
    white-space: nowrap;
  }

  /* ── SVG ────────────────────────────────────────────────────────────────── */
  #viz {
    position: fixed; inset: 0;
    transition: right 0.4s cubic-bezier(0.4,0,0.2,1);
  }
  #viz.panel-open { right: var(--panel-w); }

  /* ── LEGEND ─────────────────────────────────────────────────────────────── */
  #legend {
    position: fixed; bottom: 28px; left: 28px;
    z-index: 100; display: flex; flex-direction: column; gap: 7px;
    transition: opacity 0.3s;
  }
  .legend-label {
    font-size: 9px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 4px;
  }
  .legend-item {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; color: var(--text);
    cursor: pointer; transition: opacity 0.2s;
  }
  .legend-item:hover { opacity: 0.7; }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 50%;
    flex-shrink: 0; box-shadow: 0 0 6px currentColor;
  }

  /* ── STATS ──────────────────────────────────────────────────────────────── */
  #stats {
    position: fixed; bottom: 28px; right: 28px;
    z-index: 100; text-align: right;
    transition: right 0.4s cubic-bezier(0.4,0,0.2,1), opacity 0.3s;
  }
  #stats.panel-open { right: calc(var(--panel-w) + 28px); }
  .stat-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px; letter-spacing: 0.05em;
    color: var(--accent); line-height: 1;
  }
  .stat-lbl {
    font-size: 9px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 12px;
  }

  /* ── TOOLTIP (hover only) ───────────────────────────────────────────────── */
  #tooltip {
    position: fixed; z-index: 200;
    pointer-events: none; opacity: 0;
    transition: opacity 0.12s;
  }
  .tip-inner {
    background: var(--panel); border: 1px solid var(--border);
    border-top-width: 2px; padding: 10px 14px;
    min-width: 150px; position: relative;
    box-shadow: 0 8px 28px rgba(0,0,0,0.6);
  }
  .tip-inner::before {
    content: '';
    position: absolute; top: -1px; left: 0; right: 0; height: 2px;
    background: var(--tip-color, var(--accent));
    box-shadow: 0 0 8px var(--tip-color, var(--accent));
  }
  .tip-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 17px; letter-spacing: 0.05em;
    color: #fff; line-height: 1; margin-bottom: 4px;
  }
  .tip-sub { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; }

  /* ── DETAIL PANEL ───────────────────────────────────────────────────────── */
  #detail-panel {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: var(--panel-w);
    background: var(--panel);
    border-left: 1px solid var(--border);
    z-index: 150;
    display: flex; flex-direction: column;
    transform: translateX(100%);
    transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
    overflow: hidden;
  }
  #detail-panel.open { transform: translateX(0); }

  /* accent bar at top, color changes with faction */
  .panel-bar {
    height: 3px;
    background: var(--panel-color, var(--accent));
    box-shadow: 0 0 16px var(--panel-color, var(--accent));
    flex-shrink: 0;
  }

  .panel-header {
    padding: 20px 22px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    position: relative;
  }

  #panel-faction-tag {
    font-size: 9px; letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  #panel-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px; letter-spacing: 0.06em;
    color: #fff; line-height: 1; margin-bottom: 8px;
  }

  #panel-role {
    font-size: 11px; color: var(--muted); line-height: 1.6;
  }

  #panel-close {
    position: absolute; top: 16px; right: 16px;
    background: none; border: 1px solid var(--border);
    color: var(--muted); width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 14px; border-radius: 2px;
    transition: color 0.2s, border-color 0.2s;
  }
  #panel-close:hover { color: #fff; border-color: #fff; }

  /* connection stats row */
  .panel-stats {
    display: flex; gap: 0;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .pstat {
    flex: 1; padding: 12px 0; text-align: center;
    border-right: 1px solid var(--border);
  }
  .pstat:last-child { border-right: none; }
  .pstat-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px; color: var(--accent); line-height: 1;
  }
  .pstat-lbl {
    font-size: 8px; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--muted); margin-top: 2px;
  }

  /* connections list */
  .panel-section-title {
    font-size: 8px; letter-spacing: 0.25em;
    text-transform: uppercase; color: var(--muted);
    padding: 14px 22px 8px;
    flex-shrink: 0;
  }

  #panel-connections {
    flex: 1; overflow-y: auto;
    padding: 0 22px 22px;
  }
  #panel-connections::-webkit-scrollbar { width: 4px; }
  #panel-connections::-webkit-scrollbar-track { background: transparent; }
  #panel-connections::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .conn-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .conn-item:last-child { border-bottom: none; }
  .conn-item:hover { opacity: 0.7; }

  .conn-dot {
    width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
    box-shadow: 0 0 5px currentColor;
  }

  .conn-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px; letter-spacing: 0.05em; color: #fff;
    flex: 1; line-height: 1;
  }

  .conn-label {
    font-size: 9.5px; color: var(--muted);
    text-align: right; line-height: 1.3;
  }

  .conn-badge {
    font-size: 7.5px; letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 2px 5px; border-radius: 2px;
    flex-shrink: 0;
  }
  .badge-ally   { background: rgba(59,142,240,0.15); color: #3b8ef0; border: 1px solid rgba(59,142,240,0.3); }
  .badge-rival  { background: rgba(212,58,58,0.15);  color: #d43a3a; border: 1px solid rgba(212,58,58,0.3); }
  .badge-family { background: rgba(232,160,32,0.15); color: #e8a020; border: 1px solid rgba(232,160,32,0.3); }
  .badge-love   { background: rgba(255,107,138,0.15);color: #ff6b8a; border: 1px solid rgba(255,107,138,0.3); }

  /* selected node ring */
  .node.selected circle:nth-child(2) {
    stroke-width: 3;
    filter: brightness(1.4);
  }

  /* dim states */
  .node.dimmed circle { opacity: 0.15; }
  .node.dimmed text   { opacity: 0.06; }
  .link.dimmed        { opacity: 0.05; }
  .node.highlighted circle { filter: brightness(1.3); }
</style>
</head>
<body>

<header id="header">
  <div class="title-block">
    <div class="title-jp">東京卍リベンジャーズ</div>
    <h1>TOKYO <span>REVENGERS</span></h1>
  </div>
  <div class="badge">Character Network</div>
</header>

<svg id="viz"></svg>

<div id="hint">Click any character to see their full profile</div>

<div id="legend">
  <div class="legend-label">Factions</div>
</div>

<div id="stats">
  <div class="stat-val" id="stat-nodes">0</div>
  <div class="stat-lbl">Characters</div>
  <div class="stat-val" id="stat-links">0</div>
  <div class="stat-lbl">Connections</div>
</div>

<!-- hover tooltip -->
<div id="tooltip"><div class="tip-inner">
  <div class="tip-name" id="tip-name"></div>
  <div class="tip-sub"  id="tip-sub"></div>
</div></div>

<!-- ── DETAIL PANEL ──────────────────────────────────────────────────────── -->
<div id="detail-panel">
  <div class="panel-bar" id="panel-bar"></div>
  <div class="panel-header">
    <div id="panel-faction-tag"></div>
    <div id="panel-name"></div>
    <div id="panel-role"></div>
    <button id="panel-close" aria-label="Close">✕</button>
  </div>
  <div class="panel-stats">
    <div class="pstat"><div class="pstat-val" id="ps-total">0</div><div class="pstat-lbl">Connections</div></div>
    <div class="pstat"><div class="pstat-val" id="ps-allies">0</div><div class="pstat-lbl">Allies</div></div>
    <div class="pstat"><div class="pstat-val" id="ps-rivals">0</div><div class="pstat-lbl">Rivals</div></div>
    <div class="pstat"><div class="pstat-val" id="ps-family">0</div><div class="pstat-lbl">Family</div></div>
  </div>
  <div class="panel-section-title">Connections</div>
  <div id="panel-connections"></div>
</div>

<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
const factions = {
  toman:        { label: "Toman",           color: "#3b8ef0" },
  valhalla:     { label: "Valhalla",        color: "#d43a3a" },
  blackDragon:  { label: "Black Dragon",    color: "#9b59b6" },
  brahman:      { label: "Brahman",         color: "#e8a020" },
  kantou:       { label: "Kantou Manji",    color: "#2ecc71" },
  neutral:      { label: "Unaffiliated",    color: "#8899aa" },
};

const nodes = [
  { id: "Takemichi",  faction:"toman",       role:"Captain (12th gen) · Time-leaper",         size: 22 },
  { id: "Mikey",      faction:"toman",       role:"Founder & President of Toman",              size: 28 },
  { id: "Draken",     faction:"toman",       role:"Vice-President of Toman",                   size: 24 },
  { id: "Chifuyu",    faction:"toman",       role:"Vice-Captain, 1st Division",                size: 18 },
  { id: "Baji",       faction:"toman",       role:"Captain, 1st Division",                     size: 18 },
  { id: "Mitsuya",    faction:"toman",       role:"Captain, 2nd Division",                     size: 18 },
  { id: "Pah-chin",   faction:"toman",       role:"Captain, 3rd Division",                     size: 16 },
  { id: "Kazutora",   faction:"valhalla",    role:"Co-founder of Toman · Valhalla member",     size: 20 },
  { id: "Angry",      faction:"toman",       role:"Captain, 4th Division",                     size: 15 },
  { id: "Smiley",     faction:"toman",       role:"Vice-Captain, 4th Division",                size: 15 },
  { id: "Hakkai",     faction:"toman",       role:"Vice-Captain, 2nd Division",                size: 15 },
  { id: "Kisaki",     faction:"valhalla",    role:"Mastermind antagonist",                     size: 24 },
  { id: "Hanma",      faction:"valhalla",    role:"Valhalla Captain · Kisaki's right hand",    size: 19 },
  { id: "Taiju",      faction:"blackDragon", role:"11th-gen Black Dragon leader",              size: 22 },
  { id: "Izana",      faction:"kantou",      role:"Tenjiku & Kantou Manji leader",             size: 24 },
  { id: "Kakucho",    faction:"kantou",      role:"Tenjiku Four Heavenly Kings",               size: 17 },
  { id: "Sanzu",      faction:"kantou",      role:"Kantou Manji Vice-Captain",                 size: 18 },
  { id: "Wakasa",     faction:"blackDragon", role:"2nd-gen Black Dragon",                      size: 16 },
  { id: "Senju",      faction:"brahman",     role:"Brahman President",                         size: 20 },
  { id: "Haruchiyo",  faction:"brahman",     role:"Brahman Vice-President",                    size: 17 },
  { id: "Shinichiro", faction:"neutral",     role:"1st-gen Black Dragon · Mikey's brother",   size: 19 },
  { id: "Hina",       faction:"neutral",     role:"Takemichi's girlfriend",                    size: 16 },
  { id: "Naoto",      faction:"neutral",     role:"Hina's brother · police detective",         size: 15 },
];

const links = [
  { source:"Takemichi", target:"Mikey",      type:"ally",   label:"sworn ally" },
  { source:"Takemichi", target:"Draken",     type:"ally",   label:"friend" },
  { source:"Takemichi", target:"Chifuyu",    type:"ally",   label:"partner" },
  { source:"Takemichi", target:"Hina",       type:"love",   label:"love" },
  { source:"Takemichi", target:"Naoto",      type:"ally",   label:"co-conspirator" },
  { source:"Mikey",     target:"Draken",     type:"ally",   label:"best friend" },
  { source:"Mikey",     target:"Baji",       type:"ally",   label:"childhood friend" },
  { source:"Mikey",     target:"Kazutora",   type:"rival",  label:"childhood friend/rival" },
  { source:"Mikey",     target:"Shinichiro", type:"family", label:"brothers" },
  { source:"Mikey",     target:"Sanzu",      type:"ally",   label:"loyal subordinate" },
  { source:"Mikey",     target:"Izana",      type:"family", label:"half-brothers" },
  { source:"Baji",      target:"Kazutora",   type:"ally",   label:"best friend" },
  { source:"Baji",      target:"Chifuyu",    type:"ally",   label:"vice-captain bond" },
  { source:"Chifuyu",   target:"Kazutora",   type:"rival",  label:"clash/respect" },
  { source:"Mitsuya",   target:"Hakkai",     type:"ally",   label:"captain & vice" },
  { source:"Angry",     target:"Smiley",     type:"family", label:"twin brothers" },
  { source:"Draken",    target:"Mitsuya",    type:"ally",   label:"Toman founders" },
  { source:"Taiju",     target:"Hakkai",     type:"family", label:"siblings (rivals)" },
  { source:"Taiju",     target:"Wakasa",     type:"ally",   label:"Black Dragon" },
  { source:"Shinichiro",target:"Wakasa",     type:"ally",   label:"co-founders" },
  { source:"Kisaki",    target:"Hanma",      type:"ally",   label:"right-hand man" },
  { source:"Kisaki",    target:"Takemichi",  type:"rival",  label:"arch-nemesis" },
  { source:"Kisaki",    target:"Hina",       type:"rival",  label:"obsession/threat" },
  { source:"Kazutora",  target:"Hanma",      type:"ally",   label:"Valhalla members" },
  { source:"Izana",     target:"Kakucho",    type:"ally",   label:"loyal subordinate" },
  { source:"Izana",     target:"Sanzu",      type:"ally",   label:"Tenjiku member" },
  { source:"Sanzu",     target:"Haruchiyo",  type:"family", label:"siblings" },
  { source:"Senju",     target:"Haruchiyo",  type:"ally",   label:"Brahman leadership" },
  { source:"Senju",     target:"Takemichi",  type:"ally",   label:"alliance" },
  { source:"Hina",      target:"Naoto",      type:"family", label:"siblings" },
  { source:"Naoto",     target:"Takemichi",  type:"ally",   label:"time-leap contract" },
];

// ─── SETUP ───────────────────────────────────────────────────────────────────
let W = window.innerWidth, H = window.innerHeight;
const svg = d3.select("#viz").attr("width", W).attr("height", H);

const defs = svg.append("defs");
Object.entries(factions).forEach(([key, f]) => {
  const flt = defs.append("filter").attr("id", `glow-${key}`)
    .attr("x","-50%").attr("y","-50%").attr("width","200%").attr("height","200%");
  flt.append("feGaussianBlur").attr("stdDeviation","4").attr("result","coloredBlur");
  const merge = flt.append("feMerge");
  merge.append("feMergeNode").attr("in","coloredBlur");
  merge.append("feMergeNode").attr("in","SourceGraphic");
});

["ally","rival","family","love"].forEach(t => {
  defs.append("marker").attr("id", `arrow-${t}`)
    .attr("markerWidth",6).attr("markerHeight",6)
    .attr("refX",6).attr("refY",3).attr("orient","auto")
    .append("path").attr("d","M0,0 L0,6 L6,3 z")
    .attr("fill", t==="rival"?"#d43a3a": t==="love"?"#ff6b8a": t==="family"?"#e8a020":"#555");
});

const container = svg.append("g").attr("class","container");

svg.call(d3.zoom().scaleExtent([0.3,3])
  .on("zoom", e => container.attr("transform", e.transform)));

// ─── LINKS ───────────────────────────────────────────────────────────────────
const linkStyle = {
  ally:   { color:"#2a3a5a", dash:null,   width:1.5 },
  rival:  { color:"#6a1a1a", dash:"5,3",  width:2   },
  family: { color:"#6a5010", dash:"2,2",  width:2   },
  love:   { color:"#8a2040", dash:null,   width:1.5 },
};

const link = container.append("g").selectAll("line")
  .data(links).join("line")
  .attr("class","link")
  .attr("stroke", d => linkStyle[d.type].color)
  .attr("stroke-width", d => linkStyle[d.type].width)
  .attr("stroke-dasharray", d => linkStyle[d.type].dash || null)
  .attr("marker-end", d => `url(#arrow-${d.type})`);

// ─── NODES ───────────────────────────────────────────────────────────────────
const node = container.append("g").selectAll("g")
  .data(nodes).join("g").attr("class","node")
  .call(d3.drag()
    .on("start", dragStart)
    .on("drag",  dragged)
    .on("end",   dragEnd));

node.append("circle")
  .attr("r", d => d.size + 5).attr("fill","none")
  .attr("stroke", d => factions[d.faction].color)
  .attr("stroke-width",1).attr("stroke-opacity",0.2)
  .attr("filter", d => `url(#glow-${d.faction})`);

node.append("circle")
  .attr("r", d => d.size)
  .attr("fill", d => factions[d.faction].color + "cc")
  .attr("stroke", d => factions[d.faction].color)
  .attr("stroke-width",2)
  .attr("filter", d => `url(#glow-${d.faction})`);

node.append("text")
  .text(d => d.id)
  .attr("dy", d => d.size + 13)
  .attr("text-anchor","middle")
  .attr("font-size", d => d.size > 20 ? 11 : 9.5)
  .attr("fill", d => factions[d.faction].color)
  .attr("stroke","#080a0d").attr("stroke-width",3)
  .attr("paint-order","stroke fill")
  .attr("pointer-events","none");

// ─── DETAIL PANEL LOGIC ──────────────────────────────────────────────────────
const panel       = document.getElementById("detail-panel");
const panelBar    = document.getElementById("panel-bar");
const panelName   = document.getElementById("panel-name");
const panelFTag   = document.getElementById("panel-faction-tag");
const panelRole   = document.getElementById("panel-role");
const panelConns  = document.getElementById("panel-connections");
const psTotal     = document.getElementById("ps-total");
const psAllies    = document.getElementById("ps-allies");
const psRivals    = document.getElementById("ps-rivals");
const psFamily    = document.getElementById("ps-family");
const vizEl       = document.getElementById("viz");
const headerEl    = document.getElementById("header");
const statsEl     = document.getElementById("stats");
const hintEl      = document.getElementById("hint");

let selectedId = null;

function getConnections(id) {
  return links
    .filter(l => {
      const s = typeof l.source === "object" ? l.source.id : l.source;
      const t = typeof l.target === "object" ? l.target.id : l.target;
      return s === id || t === id;
    })
    .map(l => {
      const s = typeof l.source === "object" ? l.source.id : l.source;
      const t = typeof l.target === "object" ? l.target.id : l.target;
      const otherId = s === id ? t : s;
      return { id: otherId, type: l.type, label: l.label };
    });
}

function openPanel(d) {
  selectedId = d.id;
  const fac = factions[d.faction];
  const color = fac.color;

  // style panel
  panelBar.style.background = color;
  panelBar.style.boxShadow  = `0 0 16px ${color}`;
  panelFTag.textContent     = fac.label.toUpperCase();
  panelFTag.style.color     = color;
  panelName.textContent     = d.id;
  panelRole.textContent     = d.role;

  // connections
  const conns = getConnections(d.id);
  psTotal.textContent  = conns.length;
  psAllies.textContent = conns.filter(c => c.type === "ally").length;
  psRivals.textContent = conns.filter(c => c.type === "rival").length;
  psFamily.textContent = conns.filter(c => c.type === "family" || c.type === "love").length;

  panelConns.innerHTML = "";
  conns.forEach(c => {
    const other = nodes.find(n => n.id === c.id);
    if (!other) return;
    const oColor = factions[other.faction].color;

    const item = document.createElement("div");
    item.className = "conn-item";
    item.innerHTML = `
      <div class="conn-dot" style="background:${oColor};color:${oColor}"></div>
      <div class="conn-name">${c.id}</div>
      <div class="conn-label">${c.label}</div>
      <div class="conn-badge badge-${c.type}">${c.type}</div>
    `;
    // clicking a connection in the panel opens that character
    item.addEventListener("click", () => {
      const target = nodes.find(n => n.id === c.id);
      if (target) openPanel(target);
    });
    panelConns.appendChild(item);
  });

  // open panel + shift layout
  panel.classList.add("open");
  vizEl.classList.add("panel-open");
  headerEl.classList.add("panel-open");
  statsEl.classList.add("panel-open");

  // highlight selected node & dim others
  applyFocusState(d.id);

  hintEl.style.opacity = "0";
}

function closePanel() {
  selectedId = null;
  panel.classList.remove("open");
  vizEl.classList.remove("panel-open");
  headerEl.classList.remove("panel-open");
  statsEl.classList.remove("panel-open");
  node.classed("dimmed selected highlighted", false);
  link.classed("dimmed", false);
}

function applyFocusState(id) {
  const connectedIds = new Set([id]);
  links.forEach(l => {
    const s = typeof l.source === "object" ? l.source.id : l.source;
    const t = typeof l.target === "object" ? l.target.id : l.target;
    if (s === id || t === id) { connectedIds.add(s); connectedIds.add(t); }
  });
  node.classed("dimmed",      n => !connectedIds.has(n.id));
  node.classed("selected",    n => n.id === id);
  node.classed("highlighted", n => n.id === id);
  link.classed("dimmed", l => {
    const s = typeof l.source === "object" ? l.source.id : l.source;
    const t = typeof l.target === "object" ? l.target.id : l.target;
    return s !== id && t !== id;
  });
}

document.getElementById("panel-close").addEventListener("click", closePanel);

// ─── HOVER TOOLTIP ───────────────────────────────────────────────────────────
const tooltip = document.getElementById("tooltip");
const tipName  = document.getElementById("tip-name");
const tipSub   = document.getElementById("tip-sub");
const tipInner = document.querySelector(".tip-inner");

node
  .on("mouseenter", (event, d) => {
    if (selectedId) return; // suppress tooltip when panel is open
    const fac = factions[d.faction];
    tipName.textContent = d.id;
    tipSub.textContent  = fac.label.toUpperCase();
    tipSub.style.color  = fac.color;
    tipInner.style.setProperty("--tip-color", fac.color);
    tooltip.style.opacity = 1;

    const connectedIds = new Set([d.id]);
    links.forEach(l => {
      const s = typeof l.source === "object" ? l.source.id : l.source;
      const t = typeof l.target === "object" ? l.target.id : l.target;
      if (s === d.id || t === d.id) { connectedIds.add(s); connectedIds.add(t); }
    });
    node.classed("dimmed",      n => !connectedIds.has(n.id));
    node.classed("highlighted", n => n.id === d.id);
    link.classed("dimmed", l => {
      const s = typeof l.source === "object" ? l.source.id : l.source;
      const t = typeof l.target === "object" ? l.target.id : l.target;
      return s !== d.id && t !== d.id;
    });
  })
  .on("mousemove", event => {
    const x = event.clientX + 16, y = event.clientY - 20;
    tooltip.style.left = Math.min(x, W - 200) + "px";
    tooltip.style.top  = Math.max(y, 10) + "px";
  })
  .on("mouseleave", () => {
    if (selectedId) return;
    tooltip.style.opacity = 0;
    node.classed("dimmed highlighted", false);
    link.classed("dimmed", false);
  })
  .on("click", (event, d) => {
    event.stopPropagation();
    if (selectedId === d.id) { closePanel(); return; }
    openPanel(d);
  });

// click background to close
svg.on("click", () => { if (selectedId) closePanel(); });

// ─── LEGEND ──────────────────────────────────────────────────────────────────
const legendEl = document.getElementById("legend");
Object.entries(factions).forEach(([key, f]) => {
  const item = document.createElement("div");
  item.className = "legend-item";
  item.innerHTML = `<span class="legend-dot" style="background:${f.color};color:${f.color}"></span><span>${f.label}</span>`;
  legendEl.appendChild(item);
});

document.getElementById("stat-nodes").textContent = nodes.length;
document.getElementById("stat-links").textContent = links.length;

// ─── SIMULATION ──────────────────────────────────────────────────────────────
const sim = d3.forceSimulation(nodes)
  .force("link", d3.forceLink(links).id(d => d.id).distance(d => {
    if (d.type === "family") return 80;
    if (d.type === "love")   return 90;
    return 120;
  }).strength(0.5))
  .force("charge", d3.forceManyBody().strength(d => -d.size * 18))
  .force("center",    d3.forceCenter(W / 2, H / 2))
  .force("collision", d3.forceCollide(d => d.size + 18))
  .on("tick", () => {
    link
      .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
      .attr("x2", d => {
        const dx = d.target.x - d.source.x, dy = d.target.y - d.source.y;
        const dist = Math.sqrt(dx*dx + dy*dy) || 1;
        return d.target.x - (dx / dist) * (d.target.size + 7);
      })
      .attr("y2", d => {
        const dx = d.target.x - d.source.x, dy = d.target.y - d.source.y;
        const dist = Math.sqrt(dx*dx + dy*dy) || 1;
        return d.target.y - (dy / dist) * (d.target.size + 7);
      });
    node.attr("transform", d => `translate(${d.x},${d.y})`);

    // keep selected node focus in sync during drag
    if (selectedId) applyFocusState(selectedId);
  });

function dragStart(e, d) {
  if (!e.active) sim.alphaTarget(0.3).restart();
  d.fx = d.x; d.fy = d.y;
}
function dragged(e, d) { d.fx = e.x; d.fy = e.y; }
function dragEnd(e, d) {
  if (!e.active) sim.alphaTarget(0);
  d.fx = null; d.fy = null;
}

window.addEventListener("resize", () => {
  W = window.innerWidth; H = window.innerHeight;
  svg.attr("width", W).attr("height", H);
  sim.force("center", d3.forceCenter(W / 2, H / 2)).alpha(0.3).restart();
});
</script>
</body>
</html>
