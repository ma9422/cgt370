<head>

<title>Spotify Featured Artists — Circle Packing</title>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: rgba(255,255,255,0.07);
    --text: #f0eff5;
    --muted: rgba(240,239,245,0.45);
    --hint: rgba(240,239,245,0.22);
    --accent: #1DB954;

    --c-pop:        #4a9eff;
    --c-hiphop:     #ff6b35;
    --c-rock:       #7ec845;
    --c-kpop:       #f06292;
    --c-edm:        #b39ddb;
    --c-rnb:        #26d7a0;
    --c-country:    #ffb74d;
    --c-classical:  #90a4ae;
    --c-folk:       #aed581;
    --c-latin:      #f48fb1;
    --c-other:      #78909c;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.5;
    overflow-x: hidden;
  }

  /* ── Layout ── */
  .app { display: flex; flex-direction: column; min-height: 100vh; }

  header {
    padding: 28px 36px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }

  .header-left h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: clamp(20px, 3vw, 30px);
    letter-spacing: -0.02em;
    color: var(--text);
  }
  .header-left h1 span { color: var(--accent); }
  .header-left p {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
    max-width: 480px;
  }

  .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  .depth-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
  }
  .depth-badge .sep { opacity: 0.3; }
  .depth-badge .crumb {
    color: var(--text);
    font-weight: 500;
    cursor: pointer;
    transition: color 0.15s;
  }
  .depth-badge .crumb:hover { color: var(--accent); }
  .depth-badge .crumb.active { color: var(--accent); cursor: default; }

  .btn-reset {
    display: none;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-reset:hover { border-color: var(--accent); color: var(--accent); }
  .btn-reset.visible { display: flex; }

  /* ── LEGEND ── */
  .legend-bar {
    padding: 14px 36px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 6px 18px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    transition: color 0.15s;
    padding: 2px 0;
  }
  .legend-item:hover { color: var(--text); }
  .legend-item.active { color: var(--text); }
  .legend-dot {
    width: 9px; height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
    transition: transform 0.15s;
  }
  .legend-item:hover .legend-dot { transform: scale(1.4); }

  /* ── CHART ── */
  .chart-wrap {
    flex: 1;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 36px;
    min-height: 500px;
  }

  #chart-svg {
    display: block;
    width: 100%;
    max-width: 100%;
    height: auto;
    cursor: default;
  }

  .node-group { transition: opacity 0.2s; }

  circle {
    transition: stroke-width 0.15s, opacity 0.15s;
  }

  /* ── TOOLTIP ── */
  #tooltip {
    position: fixed;
    pointer-events: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 13px;
    line-height: 1.6;
    display: none;
    z-index: 1000;
    max-width: 220px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    backdrop-filter: blur(4px);
  }
  #tooltip .tip-name {
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 14px;
    color: var(--text);
    margin-bottom: 6px;
    line-height: 1.3;
  }
  #tooltip .tip-row {
    display: flex;
    justify-content: space-between;
    gap: 16px;
    color: var(--muted);
    font-size: 12px;
  }
  #tooltip .tip-row span:last-child {
    color: var(--text);
    font-weight: 500;
  }
  #tooltip .tip-badge {
    display: inline-block;
    margin-top: 8px;
    font-size: 11px;
    color: var(--accent);
    border: 1px solid rgba(29,185,84,0.3);
    border-radius: 4px;
    padding: 2px 7px;
  }

  /* ── STATS BAR ── */
  .stats-bar {
    padding: 14px 36px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
  }
  .stat { display: flex; flex-direction: column; }
  .stat-val {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 18px;
    color: var(--text);
    line-height: 1.2;
  }
  .stat-lbl { font-size: 11px; color: var(--hint); margin-top: 1px; text-transform: uppercase; letter-spacing: 0.06em; }

  /* ── ZOOM HINT ── */
  .zoom-hint {
    position: absolute;
    bottom: 36px;
    right: 36px;
    font-size: 11px;
    color: var(--hint);
    display: flex;
    align-items: center;
    gap: 5px;
    pointer-events: none;
    transition: opacity 0.4s;
  }
  .zoom-hint svg { opacity: 0.5; }

  /* ── ANIMATIONS ── */
  @keyframes fadeIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
  .anim-in { animation: fadeIn 0.35s cubic-bezier(0.16,1,0.3,1) both; }
</style>
</head>

// ── Color map ──────────────────────────────────────────────────────────
const COLOR = {
  'Pop':               '#4a9eff',
  'Hip-Hop / Rap':     '#ff6b35',
  'Rock':              '#7ec845',
  'K-Pop':             '#f06292',
  'Electronic / EDM':  '#b39ddb',
  'R&B / Soul':        '#26d7a0',
  'Country':           '#ffb74d',
  'Classical / Ambient':'#90a4ae',
  'Folk / Indie':      '#aed581',
  'Latin':             '#f48fb1',
  'Other':             '#78909c',
};
const RING_ALPHA = '18'; // hex opacity for genre ring fill

// ── Helpers ────────────────────────────────────────────────────────────
const fmt = n => n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1e3 ? Math.round(n/1e3)+'K' : String(n);
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const hex2rgba = (hex, a) => {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
};

// ── State ──────────────────────────────────────────────────────────────
let currentGenre = null;

// ── Build layout ───────────────────────────────────────────────────────
function buildRoot(data) {
  return d3.hierarchy(data)
    .sum(d => d.value ? Math.pow(d.value, 1.4) : (d.children ? 0 : 10))
    .sort((a,b) => b.value - a.value);
}

function pack(root, W, H) {
  return d3.pack().size([W, H]).padding(d => d.depth === 0 ? 12 : d.depth === 1 ? 6 : 3)(root);
}

// ── Render: overview (all genres) ─────────────────────────────────────
function renderOverview() {
  currentGenre = null;
  const wrap = document.getElementById('chart-wrap');
  const W = wrap.clientWidth - 72;
  const H = Math.max(480, Math.round(W * 0.62));

  const root = pack(buildRoot(RAW), W, H);
  const svg = d3.select('#chart-svg').attr('viewBox', `0 0 ${W} ${H}`);
  svg.selectAll('*').remove();

  const defs = svg.append('defs');

  // radial gradient per genre
  RAW.children.forEach(g => {
    const col = COLOR[g.name] || '#888';
    const grad = defs.append('radialGradient').attr('id', `gr-${g.name.replace(/\W/g,'_')}`)
      .attr('cx','40%').attr('cy','35%').attr('r','65%');
    grad.append('stop').attr('offset','0%').attr('stop-color', col).attr('stop-opacity', 0.22);
    grad.append('stop').attr('offset','100%').attr('stop-color', col).attr('stop-opacity', 0.06);
  });

  const nodes = root.descendants().filter(d => d.depth >= 1 && d.depth <= 2);
  const g = svg.append('g');

  // depth-2 (playlist) circles – background fill
  g.selectAll('circle.pl')
    .data(nodes.filter(d => d.depth === 2))
    .join('circle').attr('class','pl')
    .attr('cx', d => d.x).attr('cy', d => d.y).attr('r', d => d.r)
    .attr('fill', d => {
      const genre = d.parent.data.name;
      const col = COLOR[genre] || '#888';
      return hex2rgba(col, 0.08);
    })
    .attr('stroke', 'none');

  // depth-1 (genre) ring circles
  const genreNodes = g.selectAll('g.genre')
    .data(nodes.filter(d => d.depth === 1))
    .join('g').attr('class','genre')
    .attr('transform', d => `translate(${d.x},${d.y})`)
    .style('cursor','pointer')
    .on('click', (e, d) => drillToGenre(d.data.name))
    .on('mousemove', (e, d) => showTip(e, d, 'genre'))
    .on('mouseleave', hideTip);

  genreNodes.append('circle')
    .attr('r', d => d.r)
    .attr('fill', d => `url(#gr-${d.data.name.replace(/\W/g,'_')})`)
    .attr('stroke', d => COLOR[d.data.name] || '#888')
    .attr('stroke-width', 1.5)
    .attr('stroke-opacity', 0.5);

  // genre label
  genreNodes.filter(d => d.r > 28)
    .append('text')
    .attr('text-anchor','middle')
    .attr('dominant-baseline','middle')
    .attr('dy', d => d.r > 55 ? '-0.7em' : '0')
    .attr('font-family',"'Syne', sans-serif")
    .attr('font-weight','700')
    .attr('font-size', d => clamp(d.r * 0.2, 10, 15) + 'px')
    .attr('fill', d => COLOR[d.data.name] || '#aaa')
    .attr('pointer-events','none')
    .text(d => d.data.name);

  genreNodes.filter(d => d.r > 55)
    .append('text')
    .attr('text-anchor','middle')
    .attr('dominant-baseline','middle')
    .attr('dy','0.9em')
    .attr('font-family',"'DM Sans', sans-serif")
    .attr('font-size', d => clamp(d.r * 0.14, 9, 11) + 'px')
    .attr('fill', d => COLOR[d.data.name] || '#aaa')
    .attr('opacity', 0.55)
    .attr('pointer-events','none')
    .text(d => {
      const total = d.children ? d.children.reduce((s,c) => s + (c.data.artist_count || 0), 0) : 0;
      return total ? `${total} artists` : '';
    });

  // hover glow ring
  genreNodes.append('circle')
    .attr('r', d => d.r)
    .attr('fill','none')
    .attr('stroke', d => COLOR[d.data.name] || '#888')
    .attr('stroke-width', 2.5)
    .attr('stroke-opacity', 0)
    .attr('pointer-events','none')
    .attr('class','hover-ring');

  genreNodes
    .on('mouseenter', function(e, d) {
      d3.select(this).select('.hover-ring').attr('stroke-opacity', 0.6);
    })
    .on('mouseleave', function(e, d) {
      d3.select(this).select('.hover-ring').attr('stroke-opacity', 0);
      hideTip();
    });

  // legend
  buildLegend(RAW.children.map(c => c.name));
  // breadcrumb
  setBreadcrumb([]);
  // stats
  buildStats(RAW);

  document.getElementById('btn-reset').classList.remove('visible');
  document.getElementById('zoom-hint').style.opacity = '1';
}

// ── Render: drilled genre ──────────────────────────────────────────────
function drillToGenre(genreName) {
  currentGenre = genreName;
  const genreData = RAW.children.find(c => c.name === genreName);
  if (!genreData) return;

  const wrap = document.getElementById('chart-wrap');
  const W = wrap.clientWidth - 72;
  const H = Math.max(520, Math.round(W * 0.7));
  const color = COLOR[genreName] || '#888';

  const subtree = { name: genreName, children: genreData.children };
  const root = pack(buildRoot(subtree), W, H);
  const nodes = root.descendants().filter(d => d.depth >= 1);

  const svg = d3.select('#chart-svg').attr('viewBox', `0 0 ${W} ${H}`);
  svg.selectAll('*').remove();

  const defs = svg.append('defs');
  const grad = defs.append('radialGradient').attr('id','drill-grad').attr('cx','40%').attr('cy','35%').attr('r','65%');
  grad.append('stop').attr('offset','0%').attr('stop-color', color).attr('stop-opacity', 0.25);
  grad.append('stop').attr('offset','100%').attr('stop-color', color).attr('stop-opacity', 0.04);

  const g = svg.append('g');

  // playlist rings (depth 1)
  const plGroups = g.selectAll('g.pl')
    .data(nodes.filter(d => d.depth === 1))
    .join('g').attr('class','pl')
    .attr('transform', d => `translate(${d.x},${d.y})`);

  plGroups.append('circle')
    .attr('r', d => d.r)
    .attr('fill', `url(#drill-grad)`)
    .attr('stroke', color)
    .attr('stroke-width', 1.2)
    .attr('stroke-opacity', 0.4);

  // playlist label
  plGroups.filter(d => d.r > 22)
    .append('text')
    .attr('text-anchor','middle')
    .attr('dy', d => d.children ? `-${d.r * 0.55}px` : '0.35em')
    .attr('font-family',"'Syne', sans-serif")
    .attr('font-weight','600')
    .attr('font-size', d => clamp(d.r * 0.18, 9, 13) + 'px')
    .attr('fill', color)
    .attr('pointer-events','none')
    .text(d => d.data.name.length > 20 ? d.data.name.slice(0,18)+'…' : d.data.name);

  plGroups.filter(d => d.r > 50 && d.data.artist_count)
    .append('text')
    .attr('text-anchor','middle')
    .attr('dy', d => `-${d.r * 0.35}px`)
    .attr('font-size', d => clamp(d.r * 0.12, 8, 10) + 'px')
    .attr('fill', color)
    .attr('opacity', 0.5)
    .attr('pointer-events','none')
    .text(d => `${d.data.artist_count} artists · avg pop ${d.data.avg_popularity}`);

  // artist circles (depth 2)
  const artistNodes = nodes.filter(d => d.depth === 2);

  const popularityScale = d3.scaleLinear()
    .domain([d3.min(artistNodes, d => d.data.popularity), 100])
    .range([0.35, 1]);

  g.selectAll('circle.artist')
    .data(artistNodes)
    .join('circle').attr('class','artist')
    .attr('cx', d => d.x).attr('cy', d => d.y).attr('r', d => d.r)
    .attr('fill', d => {
      const alpha = popularityScale(d.data.popularity || 50);
      return hex2rgba(color, alpha);
    })
    .attr('stroke', color)
    .attr('stroke-width', 0.5)
    .attr('stroke-opacity', 0.3)
    .style('cursor','default')
    .on('mousemove', (e, d) => showTip(e, d, 'artist'))
    .on('mouseleave', hideTip);

  // artist labels
  g.selectAll('text.artist-name')
    .data(artistNodes.filter(d => d.r > 16))
    .join('text').attr('class','artist-name')
    .attr('x', d => d.x).attr('y', d => d.y)
    .attr('text-anchor','middle')
    .attr('dominant-baseline','middle')
    .attr('dy', d => d.r > 28 ? '-0.25em' : '0')
    .attr('font-family',"'DM Sans', sans-serif")
    .attr('font-weight','500')
    .attr('font-size', d => clamp(d.r * 0.3, 8, 12) + 'px')
    .attr('fill','#ffffff')
    .attr('opacity', d => popularityScale(d.data.popularity) * 0.9 + 0.1)
    .attr('pointer-events','none')
    .text(d => {
      const nm = d.data.name;
      if (d.r > 35) return nm;
      const words = nm.split(' ');
      return words[0].length <= 10 ? words[0] : words[0].slice(0,8)+'…';
    });

  g.selectAll('text.artist-pop')
    .data(artistNodes.filter(d => d.r > 28))
    .join('text').attr('class','artist-pop')
    .attr('x', d => d.x).attr('y', d => d.y)
    .attr('text-anchor','middle')
    .attr('dominant-baseline','middle')
    .attr('dy','0.85em')
    .attr('font-size', d => clamp(d.r * 0.22, 7, 10) + 'px')
    .attr('fill','rgba(255,255,255,0.55)')
    .attr('pointer-events','none')
    .text(d => `${d.data.popularity}`);

  buildLegend([genreName]);
  setBreadcrumb([genreName]);
  buildStats(genreData);

  document.getElementById('btn-reset').classList.add('visible');
  document.getElementById('zoom-hint').style.opacity = '0';
}

function resetAll() {
  currentGenre = null;
  renderOverview();
}

// ── Tooltip ────────────────────────────────────────────────────────────
function showTip(e, d, kind) {
  const tip = document.getElementById('tooltip');
  let html = '';
  if (kind === 'genre') {
    const totalArtists = d.children ? d.children.reduce((s,c) => s + (c.data.artist_count||0),0) : 0;
    const avgPop = d.children
      ? (d.children.reduce((s,c) => s + (c.data.avg_popularity||0), 0) / d.children.length).toFixed(1)
      : '—';
    html = `<div class="tip-name">${d.data.name}</div>
      <div class="tip-row"><span>Playlists</span><span>${d.children ? d.children.length : 0}</span></div>
      <div class="tip-row"><span>Artists featured</span><span>${totalArtists}</span></div>
      <div class="tip-row"><span>Avg popularity</span><span>${avgPop}</span></div>
      <div class="tip-badge">click to explore →</div>`;
  } else if (kind === 'artist') {
    html = `<div class="tip-name">${d.data.name}</div>
      <div class="tip-row"><span>Popularity</span><span>${d.data.popularity}</span></div>
      <div class="tip-row"><span>Monthly listeners</span><span>${fmt(d.data.monthly_listeners)}</span></div>
      <div class="tip-row"><span>Followers</span><span>${fmt(d.data.followers)}</span></div>`;
  }
  tip.innerHTML = html;
  tip.style.display = 'block';
  moveTip(e);
}

function moveTip(e) {
  const tip = document.getElementById('tooltip');
  const vw = window.innerWidth, vh = window.innerHeight;
  let x = e.clientX + 14, y = e.clientY - 10;
  if (x + 240 > vw) x = e.clientX - 240;
  if (y + 150 > vh) y = e.clientY - 150;
  tip.style.left = x + 'px';
  tip.style.top = y + 'px';
}

function hideTip() { document.getElementById('tooltip').style.display = 'none'; }

document.addEventListener('mousemove', e => {
  if (document.getElementById('tooltip').style.display !== 'none') moveTip(e);
});

// ── Legend ─────────────────────────────────────────────────────────────
function buildLegend(genres) {
  const el = document.getElementById('legend');
  el.innerHTML = '';
  genres.forEach(g => {
    const col = COLOR[g] || '#888';
    const item = document.createElement('div');
    item.className = 'legend-item' + (g === currentGenre ? ' active' : '');
    item.innerHTML = `<span class="legend-dot" style="background:${col}"></span>${g}`;
    item.onclick = () => g === currentGenre ? resetAll() : drillToGenre(g);
    el.appendChild(item);
  });
}

// ── Breadcrumb ─────────────────────────────────────────────────────────
function setBreadcrumb(path) {
  const el = document.getElementById('breadcrumb');
  let html = `<span class="crumb${!path.length?' active':''}" onclick="resetAll()">All genres</span>`;
  path.forEach((p, i) => {
    html += `<span class="sep">›</span><span class="crumb active">${p}</span>`;
  });
  el.innerHTML = html;
}

// ── Stats bar ──────────────────────────────────────────────────────────
function buildStats(data) {
  const bar = document.getElementById('stats-bar');
  let stats = [];
  if (!currentGenre) {
    const totalArtists = data.children.reduce((s, g) =>
      s + g.children.reduce((s2, p) => s2 + (p.artist_count || 0), 0), 0);
    const totalPlaylists = data.children.reduce((s, g) => s + g.children.length, 0);
    const allPops = [];
    data.children.forEach(g => g.children.forEach(p => p.children && p.children.forEach(a => allPops.push(a.popularity))));
    const avgPop = allPops.length ? (allPops.reduce((a,b)=>a+b,0)/allPops.length).toFixed(1) : '—';
    const maxPop = allPops.length ? Math.max(...allPops) : '—';
    stats = [
      { val: data.children.length, lbl: 'Genres' },
      { val: totalPlaylists, lbl: 'Playlists' },
      { val: totalArtists.toLocaleString(), lbl: 'Artist appearances' },
      { val: avgPop, lbl: 'Avg popularity' },
      { val: maxPop, lbl: 'Peak popularity' },
    ];
  } else {
    const totalArtists = data.children.reduce((s, p) => s + (p.artist_count || 0), 0);
    const allPops = [];
    data.children.forEach(p => p.children && p.children.forEach(a => allPops.push(a.popularity)));
    const avgPop = allPops.length ? (allPops.reduce((a,b)=>a+b,0)/allPops.length).toFixed(1) : '—';
    const topArtist = allPops.length ? data.children.flatMap(p => p.children || []).sort((a,b) => b.popularity - a.popularity)[0] : null;
    stats = [
      { val: data.children.length, lbl: 'Playlists' },
      { val: totalArtists.toLocaleString(), lbl: 'Artist appearances' },
      { val: avgPop, lbl: 'Avg popularity' },
      { val: topArtist ? topArtist.name : '—', lbl: 'Top artist' },
    ];
  }
  bar.innerHTML = stats.map(s => `<div class="stat"><span class="stat-val">${s.val}</span><span class="stat-lbl">${s.lbl}</span></div>`).join('');
}

// ── Init ───────────────────────────────────────────────────────────────
window.resetAll = resetAll;
window.drillToGenre = drillToGenre;

window.addEventListener('resize', () => {
  if (currentGenre) drillToGenre(currentGenre);
  else renderOverview();
});

renderOverview();
</script>
</body>
</html>
